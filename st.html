<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Train Status</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#000,#1a1a1a);
  color:white;
  text-align:center;
}

header {
  background:#111;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  box-shadow:0 0 10px rgba(255,255,255,0.2);
}

.container {
  margin-top:40px;
}

input {
  padding:12px;
  width:70%;
  max-width:300px;
  border:none;
  border-radius:8px;
  outline:none;
}

button {
  padding:12px 20px;
  background:#ff9800;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  margin-left:10px;
  transition:0.3s;
}

button:hover {
  background:#e68900;
  transform:scale(1.05);
}

.loader {
  display:none;
  margin-top:20px;
  font-size:18px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity:0.5;}
}

.result {
  margin-top:20px;
  padding:20px;
}

.card {
  background:#111;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  width:90%;
  max-width:400px;
  box-shadow:0 0 15px rgba(255,255,255,0.1);
  animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<header>🚆 Live Train Status Checker</header>

<div class="container">
  <input type="text" id="train" placeholder="Enter Train Number">
  <button onclick="getStatus()">Check</button>

  <div class="loader" id="loader">⏳ Fetching Live Data...</div>

  <div class="result" id="result"></div>
</div>

<script>
function getStatus(){
  var train = document.getElementById("train").value;

  if(train == ""){
    alert("Enter train number");
    return;
  }

  document.getElementById("loader").style.display="block";
  document.getElementById("result").innerHTML="";

  fetch("https://corsproxy.io/?https://irctc1.p.rapidapi.com/trainLiveStatus?trainNo=" + train + "&startDay=1", {
    method: "GET",
    headers: {
      "X-RapidAPI-Key": "a61c2cb28dmsh816a4962cd342cfp1a4f90jsn0183cae83615",
      "X-RapidAPI-Host": "real-time-pnr-status-api-for-indian-railways.p.rapidapi.com"
    }
  })
  .then(response => response.json())
  .then(data => {
    document.getElementById("loader").style.display="none";

    if(!data || data.status === false){
      document.getElementById("result").innerHTML = "❌ Invalid Train Number / API Limit";
      return;
    }

    let d = data.data;

    document.getElementById("result").innerHTML = `
      <div class="card">🚆 Train: ${d.train_name || 'N/A'}</div>
      <div class="card">📍 Current Station: ${d.current_station_name || 'N/A'}</div>
      <div class="card">⏱ Delay: ${d.delay || 0} min</div>
      <div class="card">📌 Status: ${d.status || 'N/A'}</div>
    `;
  })
  .catch(err => {
    document.getElementById("loader").style.display="none";
    document.getElementById("result").innerHTML = "⚠️ Error loading data (CORS / API issue)";
  });
}
</script>

</body>
</html>
