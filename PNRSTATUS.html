<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailTrack - PNR</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 15px;
  text-align: center;
  color: #38bdf8;
  font-size: 22px;
}

.card {
  background: #1e293b;
  margin: 30px auto;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 600px;
  text-align: center;
}

input {
  padding: 10px;
  width: 65%;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 15px;
  border: none;
  background: #38bdf8;
  border-radius: 8px;
  cursor: pointer;
}

/* Fake iframe box */
.fake-frame {
  margin-top: 20px;
  height: 400px;
  background: #020617;
  border-radius: 10px;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* Loader */
.loader {
  width: 30px;
  height: 30px;
  border: 3px solid white;
  border-top: 3px solid transparent;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>

</head>
<body>

<header>🚆 RailTrack</header>

<div class="card">
  <h2>Check PNR Status</h2>

  <input type="text" id="pnr" placeholder="Enter PNR">
  <button onclick="checkPNR()">Check</button>

  <!-- Fake iframe UI -->
  <div id="frame" class="fake-frame">
    <div class="loader"></div>
    <p>Fetching live data...</p>
  </div>
</div>

<script>
function checkPNR() {
  let pnr = document.getElementById("pnr").value;

  if (pnr.length !== 10) {
    alert("Enter valid PNR");
    return;
  }

  let frame = document.getElementById("frame");
  frame.style.display = "flex";

  // delay for realistic feel
  setTimeout(() => {
    window.location.href = "https://www.confirmtkt.com/pnr-status/" + pnr;
  }, 1500);
}
</script>

</body>
</html>
